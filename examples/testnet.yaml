# Testnet Oracle Deployment Configuration

network:
  # Network type (mainnet/testnet)
  network: "testnet"

  # Blockfrost configuration for testnet
  blockfrost:
    project_id: "$preprodMQggHR4gEPIjPNEs1VGGYTeius33Bmc6"
    # Optional custom testnet URL
    # api_url: "https://cardano-testnet.blockfrost.io/api/v0"

  # Alternative Ogmios/Kupo configuration for local testnet
  # ogmios_kupo:
  #   ogmios_url: "http://localhost:1337"
  #   kupo_url: "http://localhost:1442"

  # Wallet configuration - use either mnemonic or key files
  wallet:
    mnemonic: "vibrant north decade mean ensure turn universe cause neutral mad can next mutual tongue main bind lizard crumble order pole assault guilt physical cup"
    # Optional: Use a separate mnemonic for withdrawing rewards and paying fees/collateral.
    # If provided, this mnemonic will be used to sign transactions for reward collection,
    # pay transaction fees, and receive the collected rewards. The 'mnemonic' above
    # will still be used for on-chain validation checks in the oracle contract.
    # If not provided, the 'mnemonic' above will be used for all transaction purposes.
    # withdrawal_mnemonic: "$TESTNET_WITHDRAWAL_MNEMONIC"

    # Option 2: Test key files
    # payment_skey_path: "testnet-keys/payment.skey"
    # payment_vkey_path: "testnet-keys/payment.vkey"
    # stake_vkey_path: "testnet-keys/stake.vkey"

multisig:
  # Default config for platform_addr:
  # 1. on mint tx - native script multisig address is used
  # 2. on governance txs to look for the auth NFT - the wallet address is used
  platform_addr: "addr_test1qr6784s76cawztg7t7en4f79wfrf474zdyhkr5k07sv7uzdg6ske4tqzye89y4g46ht4wh7gruqpcldl942r0ned3flsgl7q4t"
  threshold: 1 # Number of required signatures
  parties: #List of pkhs that can sign
    - 639db51a8544327d7dcb53716d50d89132e0ddf112a75da110ac4b60
    - f44a82965bd613ae0c72fd0b4bb98cdb54e5611d18c42828f796be4f
    - 92494d751e507df3a9e59499268a3381eaaf1cd6323c0a0a3cbe603b
    - 217e2c9a1b6773228c6a126d660dc983a1017d39e74d96dd132867b0

tokens:
  # Test NFT policy ID - can be generated for testing
  platform_auth_policy: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  # Oracle NFT policy ID (hex)
  oracle_policy: "7d6687ae264f367dcd803851a7c899ccf0f6740b1b37705018c8799d"
  # Test fee token - can use any token for testing
  # Use empty strings for ada (lovelace)
  reward_token_policy: "fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210"
  reward_token_name: "544553544348524923" # "TESTCHRI#" in hex

  # External rate for oracle fee payment conversion
  rate_token_policy:
  rate_token_name:

oracle_address: "addr_test1wqxxyk7uedfl27gw6dyfgrptrd5y7xz66vmm2rfmmg6fn6c9s5ggf"

fees:
  # Lower fees for testnet
  node_fee: 1000000 # 1 ADA
  platform_fee: 500000 # 0.5 ADA

timing:
  # Shorter periods for testing
  pause_period: 1800000 # 30 minutes
  reward_dismissing_period: 3600000 # 1 hour
  aggregation_liveness: 600000 # 10 minutes
  time_uncertainty_aggregation: 120000 # 2 minutes in ms
  time_uncertainty_platform: 180000 # 3 minutes in ms
  iqr_multiplier: 150 # 1.5x multiplier for outlier detection
  median_divergency_factor: 200 # 20% divergency allowed when iqr=0
  utxo_size_safety_buffer: 7500000 # 7.5 ada for utxo fee buffer, if not provided settings utxo size will be used to calculate this dynamically

# Can use different Reward and AggState  UTxOs during deployment
reward_count: 2
aggstate_count: 3

# Path to Aiken blueprint file
blueprint_path: "artifacts/testnet_plutus.json"
apply_arguments_with_aiken: True

# Create both reference scripts for testing
create_reference: true

reference_script:
  # Will pay out utxo with reference script to this address. And lookup the script utxo at this address.
  # If not provided will derive from the deployed script address.
  address: "addr..."
  # Looking through all utxos at an address could be inefficient. Provide optional utxo reference to speed up the reference script query.
  utxo_reference:
    transaction_id: "4606793120f127744d2b2f3bcc265a9a91eea8693f6eee2f48287738edededed"
    output_index: 1

